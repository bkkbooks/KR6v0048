body:
  text: 大方便佛報恩經變經文偈頌整理者陳明光題解大方便佛報恩經變經文偈頌中國人所撰佛教文獻作者不詳刊刻於南宋僧人趙智鳳主持鐫刻的寶頂山石窟大佛灣北巖中部的大方便佛報恩經變龕該龕變像與變文並舉刻佛前生現世因地修行行孝報恩事跡各六組圖像為高浮雕宣揚佛難捨能捨難為能為的種種自我犧牲精神該龕是全國石窟群中最大的一龕在石刻造像中變像與變文並舉是前所少見的是研究同類題材造像發展變化的珍貴資料錄文大方便佛偈語假使熱鐵輪於我頂上旋終不以此苦退失菩提心大方便佛報恩經大藏佛說大方便佛報恩經如是我聞一時佛在耆闍崛山中大眾圍繞時阿難入城乞食城中有一男子孝養父母家中蕩盡擔父母行乞好者奉親惡者自食阿難偈贊男子供養父母時特難及有六師徒執著邪論踐滅正法心懷嫉妒語阿難言汝師釋種自言孝好有大公德唯有空名而無實行捨父母出城不知恩分是不孝人阿難聞已心懷慚愧謂佛白言佛法中頗有孝養父母不佛言誰教汝問阿難言乞食逢六師徒見毀罵辱如上所陳世尊微笑放五色光至十方如來所彼國菩薩同音何緣有此光明彼國佛言有娑婆界佛號釋迦為大眾說大方便佛報恩經欲令眾生孝養父母故放斯光明爾時如來身中現五趣身一一身中現無量微塵數不思議形類一切眾生具足受身以受身故一切眾生曾為如來父母如來亦曾為一切眾生作父母故常修難行苦行難捨能捨勤修精進具足萬行不休不息心無疲倦為孝養父母故今得速成無上菩提由孝德也佛因地修行捨身濟虎大藏佛言薩埵太子捨身濟虎父母聞已奔至捨身之處時虎食肉已惟有骸骨狼籍在地父母扶其頭足哀號悶絕時太子命終生兜率天天眼見前父母悲悼啼哭過甚或喪生命我當往諫即從天下住於空中種種言詞解諫父母父母仰問是何神耶天曰我是太子摩訶薩埵我由濟虎生兜率天父母當知有法歸無生必有終何不自覺父母言汝行大慈恩及一切於是天人復以偈句報謝父母令得醒悟皆是如來神智通達不可思議時薩埵即是我也釋迦因地割肉供父母大藏經云佛告阿難昔有國王生一太子字曰須闍提身黃金色時羅㬋惡逆王驚抱太子出投鄰國糧盡猶遠飢渴所逼太子白言就子身上日割三斤肉分作三份二份奉上父母一份自食父母聽子割而食之隨路而去太子誓言假使熱鐵輪於我頂上旋終不以此苦退於無上道若我欺狂身瘡不合若不爾者平復如故即時身體端正倍常佛告阿難彼父母者今父母是爾時太子即我身是釋迦因地鸚鵡行孝大藏雜寶藏經云有一鸚鵡父母俱盲常採花果先奉父母時有田主初種穀時而作誓言所種之物與眾生共時鸚鵡採取稻穗以供父母是時田主按行苗稼見剪稻穗忽生瞋怒網捕鸚鵡鵡告言先有好心施物無吝如何今日而見網捕田主問言汝取此穀意復何為鸚鵡答言有盲父母願以奉之田主歡喜遂放而去爾時世尊而說偈言善哉鸚鵡有智慧能懷孝養供父母我從今日以稻施任汝供養於二親如是過去無量事無有苦行而不作未曾有懷疲厭意以求無上清淨道釋迦因地行孝剜睛出髓為藥大藏經云忍辱太子知其父王身嬰重病命在旦夕求藥療治太子問言藥是何物大臣答曰是不瞋人眼睛及其人髓若得此藥即全王命太子言但使父王病得校者捨百千身亦不為難況此穢身也即呼旃陀羅剜其雙目斷骨出髓爾時大臣合藥奉王服即病瘥太子命終以牛頭旃檀闍維身骨起塔供養是知如來行孝報恩歷塵沙劫不可思議釋迦佛因行孝證三十二相大藏經云文殊白佛言座中菩薩見佛三十二相八十種好端正無比有何因緣得如是乎佛言我於世世喜燃燈於佛寺及師父母前用是因故佛身光明殊妙無比我於世世奉事師長父母四威儀中飲食臥具用是因故諸天鬼神普持世間所有珍寶以用上佛三十二相八十種好一一相好皆是由我從初發心堅固菩提知恩報恩是故今得無上菩提視諸眾身猶如父母以是因緣得是種相使我疾得阿耨多羅三藐三菩提由孝德也大藏佛說大方便佛報恩經釋迦因地雁書報太子大藏佛言善友太子入海採寶留滯他國未入海時養一白雁時母夫人往語太子昔時常共汝俱今入大海生死未分汝今云何不念太子雁即報言欲覓太子不敢違命時夫人作書繫在雁頸其雁飛空至於大海遙見太子斂身而下太子取書撥封披讀即知父母追念太子兩目失明尋即歸國父母歡喜王與夫人目瞑不見太子形容以手捫摸作如是言父母念汝憂苦如是太子問訊起居事訖持珠發願此是如意寶者令父母兩目明淨如故作是願已尋即平復父母見子歡喜無量時善友太子者亦是如來釋迦因地剜肉大藏佛言爾時轉輪聖王為求佛法故遍處宣令誰解佛法皆云言無有婆羅門解知佛法時王出迎請入正殿敷王御座前請大德願坐此座爾時大王見師坐已合掌白言大師解佛法耶師言吾解佛法王言為我解說師言王大愚也吾學是法久受勤苦因乃得成大王云何直欲得聞若能就王身上剜作千瘡燃燈供養吾為汝說不爾吾去爾時大王即自思惟報大師言所需供養當速辦之時王入宮報諸夫人五百太子今共汝別今我請師相許供養不得違錯夫為孝子不違父意王詣師所端身正坐告諸大臣誰能剜吾千瘡時旃陀羅前語王言欲剜身者我能為之王聞歡喜汝今真是我無上道伴時旃陀羅持刀剜已馳走而去爾時大王於身瘡灌油取細氈為炷爾時大師見是事已告大王言精進如是難為能為修此苦行今當為王宣說半偈云夫生輒死此滅為樂王聞法已告諸人民應為我憶持是法其見聞者速發無上菩提心爾時大王燃燈供養其明遠炤一切眾會皆發道心歡喜而去是故轉輪聖王即是如來釋迦佛因地為睒子行孝大藏佛說睒子經云佛告阿難昔有菩薩名曰慈惠孝養父母師長時迦夷國中有一長者孤無兒子兩目皆盲心願入山求無上慧菩薩念言此人入山學道我若命終當為汝子菩薩命終即便往生盲父母家字曰睒子睒年十歲隨父母入山採果汲水時國王出獵箭誤中睒胸被毒命終王心怖懼詣盲父母所具言上事父母令王牽我二人至於子所捫摸睒箭仰天呼言睒子至孝天地所知箭當拔出作是言已感帝釋與藥更生如故父母聞已兩目皆開王大歡喜睒語王言欲具福者安慰人民當令奉戒佛告阿難彼睒子者我身是也釋迦佛因地修行捨身求法大藏佛言過去世我修菩薩行能通達一切外道經論修寂滅行不為外道破壞受持常樂我淨求索大乘雪山坐禪經無量歲亦不聞如來出世大乘經名我修如是苦行時帝釋諸天心生驚怖集會說偈雪山大士唯求菩提是人當來世中作善逝者除滅無量熾燃煩惱實為難信我今試之堪任荷負菩提重擔不即現羅剎形下至雪山說半偈諸行無常是生滅法我聞半偈心生歡喜誰能說是半偈啟悟我心如是半偈義是過去未來現在諸佛之正道也羅剎答言問我是義我不食多日饑惱心亂非我本心所知為求食不得故說是語我問羅剎所食何物答言我食人暖肉熱血但為我說偈當以此身供養我設命終此身無用我為菩提捨不堅身得金剛身願為我說令得具足羅剎即說生滅滅已寂滅為樂我若若樹壁道書偈即上高樹捨身以報偈價未至地時羅剎復帝釋接取菩薩釋梵諸天稽首贊曰真是菩薩利益眾生無明暗中燃大法炬我愛如來大法故相嬈惱願聽懺悔汝必定成阿耨菩提願見濟度時帝釋諸天禮菩薩足辭退而去雪山坐禪捨全身是求半偈生滅滅已寂滅為樂釋迦牟尼佛詣父王所看病佛在王舍城耆闍崛山中光明如日時淨飯王四大俱殘害其體喘息不定種種療治無能愈者告諸王曰我今雖逝不以為苦但恨不見我子悉達如來已知父王欲終要見諸子告難陀曰淨飯王者是我曹父能生聖子利益世間今宜往詣報育養恩世尊放大光明光照王身王身患苦得安言是何光也脫是我子悉達來也王見佛來惟願手觸我身令我得安我今得見世尊痛恨即除佛即以手著父王額王應歡喜不宜煩惱常諦思念諸經法義時王聞已喜不自勝即以手捉佛手著於心上王於臥處合掌心禮命盡氣絕佛告眾言父王淨飯捨此身已生淨居天眾會聞已即捨愁毒不可思議釋迦牟尼佛為末世眾生設化故擔父王棺大藏佛言父王終已至闍維時佛共難陀等喪頭前肅恭而立阿難羅云在喪足後阿難白佛言惟願聽我擔伯父棺羅云復言惟願聽我擔祖王棺世尊慰言當來世人皆凶暴不報父母養育之恩為是不孝眾生設化法故如來躬欲擔於父王之棺即時世界六種震動一切諸天龍神皆來赴喪四天王眾皆共舉喪白佛言佛為當來不孝父母者故以自身擔父王棺我等是佛弟子從佛聞法得須陀洹是故我曹宜擔父王之棺即變為人一切人民莫不啼泣世尊躬身自手執香爐在前行於墓所令千羅漢取種種香木以火焚之爾時諸王收骨置金剛函便共起塔而為供養大眾人民作禮奉持錄文完
